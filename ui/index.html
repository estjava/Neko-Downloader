<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Neko Downloader</title>
    <link rel="stylesheet" href="../src-ui/src/lib/bootstrap-5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="../src-ui/src/lib/font-awesome-4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../src-ui/src/css/style.css">
  </head>
  <body>
    <div class="container nekodl">
      <div class="row">
        <div class="top col">
            <div class="logos">
              <i class="fa fa-github" aria-hidden="true"></i> <span>Neko Downloader</span>
            </div>
            <div class="btn-group" role="group" aria-label="window-controls">
                <button type="button" class="btn min" id="minimizeBtn"><i class="fa fa-window-minimize"></i></button>
                <button type="button" class="btn max" id="maximizeBtn"><i class="fa fa-window-maximize"></i></button>
                <button type="button" class="btn close" id="closeBtn"><i class="fa fa-window-close"></i></button>
            </div>
        </div>
      </div> 
      <div class="row">
        <div class="mid col">
            <nav class="nav tab-menu">
                <li class="nav-item">
                  <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#" role="button" aria-expanded="false">Task</a>
                  <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">Action</a></li>
                    <li><a class="dropdown-item" href="#">Another</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#">Something</a></li>
                    <li><a class="dropdown-item" href="#">Separated</a></li>
                  </ul>
                </li>
                <li class="nav-item">
                  <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#" role="button" aria-expanded="false">Tools</a>
                  <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">Something</a></li>
                  </ul>
                </li>
                <li class="nav-item">
                  <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#" role="button" aria-expanded="false">Options</a>
                  <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#"><i class="fa fa-cog"></i> Settings</a></li>
                  </ul>
                </li>
                <li class="nav-item">
                  <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#" role="button" aria-expanded="false">Help</a>
                  <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#"><i class="fa fa-info-circle"></i> About</a></li>
                  </ul>
                </li>
            </nav>
            
            <div class="ndl p-2 py-1">
                <div class="form d-flex">
                    <input class="form-control form-control-sm" type="text" id="urlInput" placeholder="Please type some URLs!" aria-label="URL input">
                    <button type="button" class="btn dl btn-sm" id="addDownload"><span><i class="fa fa-download"></i> Download</span></button>
                </div>
                
                <div class="download-list" id="downloadList">
                    <div class="empty-state">
                        <i class="fa fa-cloud-download"></i>
                        <p>No downloads yet. Add a URL to get started!</p>
                    </div>
                </div>
            </div>
        </div>
      </div> 
      <div class="row">
        <div class="bot col">
            <div class="dl-status"><span id="totalDownloads">0</span> downloads | <span id="activeDownloads">0</span> active</div>
            <div class="dl-speed">Speed: <span id="totalSpeed">0 KB/s</span></div>
        </div>
      </div>
    </div>
    <script src="../src-ui/src/lib/bootstrap-5.3.8/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
